[package]
name = "ecs_benchmarking"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Head-to-head Criterion benchmarks comparing freecs against bevy_ecs"
repository = "https://github.com/matthewjberger/ecs_benchmarking"
publish = false

[dependencies]
freecs = "3"
bevy_ecs = "0.19"
bevy_tasks = "0.19"
sky_ecs = "0.1"
cgmath = "0.18"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
criterion = { version = "0.7", features = ["html_reports"] }

[[bench]]
name = "benchmarks"
harness = false

[[bin]]
name = "report"
path = "src/bin/report.rs"

[profile.bench]
lto = "thin"
codegen-units = 1
